<!DOCTYPE html>
<html>
<head>
    <title>Email Writer Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
        }
        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h2>Email Writer Assistant</h2>
    <label for="tone">Select Tone:</label>
    <select id="tone">
        <option value="professional">Professional</option>
        <option value="casual">Casual</option>
        <option value="friendly">Friendly</option>
    </select>
    <label for="wordCount">Number of Words:</label>
    <input type="number" id="wordCount" min="50" max="500" step="50" value="100">
    <button id="setParameters">Set Parameters</button>
    <script src="popup.js"></script>
</body>
</html>
